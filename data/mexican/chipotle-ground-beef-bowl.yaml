instructions:
  - step: Cook ground beef in a pan over medium-high heat, breaking it up. Cook until no longer pink.
  - step: Drain fat thoroughly. Optional — do a water rinse by adding a cup of hot water to the pan, stir, then drain through a fine strainer. Return beef to pan.
  - step: Dice onion and mince garlic. Add onion and cook ~3 min until softened. Add garlic and cook 1 more min.
  - step: Mince chipotle peppers. Add chipotle, adobo sauce, cumin, paprika, oregano, salt, and pepper. Stir to coat.
  - step: Add tomato paste and a splash of water or broth. Stir and cook ~3–4 min until everything is combined and slightly thickened.
  - step: Serve over rice with your toppings.

protein:
  grams: "40–45"
  note: per serving with 225g ground beef; add a fried or soft-boiled egg for an extra ~6g

tips:
  - keyword: The water rinse after draining
    text: Is optional — it removes more fat but doesn't meaningfully affect protein content.
  - keyword: Chipotle in adobo can vary in heat
    text: Taste the sauce as you add it and adjust the number of peppers accordingly.
  - keyword: Great base to build on
    text: Swap beef for ground turkey (leaner) or ground chicken — all work with the same seasoning profile.
  - keyword: Scale up easily for meal prep
    text: Double the recipe and it keeps for 4 days in the fridge.
  - keyword: Fat-soluble flavor compounds
    text: Cumin's cuminaldehyde and paprika's capsanthins are fat-soluble — they dissolve into fat, not water. When the spices hit the beef and its remaining fat, those flavor compounds distribute throughout every bite. Adding spices to a rinsed, fat-free beef and then a watery sauce results in noticeably flatter flavor. The small amount of residual fat after draining is doing real work.

