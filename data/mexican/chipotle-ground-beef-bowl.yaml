id: chipotle-ground-beef-bowl
name: Chipotle Ground Beef Bowl
cuisine: mexican
difficulty: easy
time: 25
servings: 2
methods:
  - sauté
tags:
  - quick
  - high-protein
  - one-pan
  - no-marinate
  - meal-prep

description: >
  Ground beef, drained and rinsed to cut the grease, then hit with chipotle, cumin,
  garlic, and tomato. Served over rice with whatever toppings you have. A meal-prep-friendly,
  weeknight go-to — simple, filling, and extremely adjustable.

keyIngredients:
  - ground beef
  - chipotle peppers in adobo
  - cumin
  - tomato paste
  - garlic

