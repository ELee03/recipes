id: salsa-rice-burrito-bowl
name: Salsa Rice Burrito Bowl
cuisine: mexican
difficulty: easy
time: 30
servings: 2
tags: [quick, high-protein, pantry-friendly]
description: Spiced salsa rice with ground beef folded in during the rest — everything melds together in the pot. Top with cheddar and Greek yogurt. Minimal effort, maximum flavour.
keyIngredients: [ground beef, rice, salsa, black beans, cumin, chili powder, cheddar, greek yogurt]
methods: [stovetop]

ingredientGroups:
  - emoji: 🥩
    label: Protein
    actionNote: cook in a separate pan, drain and rinse, then fold into rice during the rest
    ingredients:
      - name: ground beef 90/10
        amount: 300–350g
        note: lean — drain fat after cooking, rinse under hot water if desired; minimal weight loss
        alternatives:
          - name: ground beef 80/20
            amount: 375–400g
            note: more flavour but loses 25–35% to fat when drained and rinsed — start with more to compensate
          - name: ground chicken or turkey
            amount: 300–350g
            note: leaner, same method
          - name: canned black beans
            amount: 1 can (540ml)
            note: drained and rinsed — the vegetarian version; fold in with the rice the same way

  - emoji: 🍚
    label: Rice base
    ingredients:
      - name: rice
        amount: 1 cup
        note: short-grain or long-grain parboiled both work
      - name: tomato paste
        amount: 1–2 tbsp
        note: fry in the oil with garlic for 1–2 min before adding liquid — caramelizes it, kills the tinny taste, adds depth and color; same technique as jollof
      - name: medium salsa (Tostitos or similar)
        amount: ¾ cup
        note: can push to 1 cup and reduce water to 1 cup for more salsa flavor — the salsa cooks down and integrates fully
      - name: water
        amount: 1¼ cups
        note: reduce to 1 cup if using more salsa
      - name: onion
        amount: ½ medium
        note: diced
      - name: garlic
        amount: 2–3 cloves
        note: minced
        alternatives:
          - name: frozen garlic shreds
            amount: 1½ tsp
      - name: neutral oil
        amount: 1 tbsp

  - emoji: 🌶️
    label: Seasonings
    ingredients:
      - name: cumin
        amount: 1 tsp
      - name: chili powder
        amount: 1 tsp
      - name: smoked paprika
        amount: ½ tsp
      - name: dried oregano
        amount: ¼ tsp
        note: optional
      - name: cayenne
        note: optional, for heat
      - name: salt
        amount: 1 tsp
        note: add to the cooking liquid; taste during the rest and add up to ½ tsp more if needed — rice absorbs salt heavily
      - name: black pepper

  - emoji: 🧀
    label: Toppings
    ingredients:
      - name: cheddar cheese, shredded
        note: as much as you like
      - name: Greek yogurt
        amount: 2–3 tbsp per bowl
        note: sour cream substitute

  - emoji: ➕
    label: Optional add-ins
    ingredients:
      - name: canned black beans or pinto beans
        amount: 1 can (540ml)
        note: drained and rinsed; fold in with the beef during the rest
      - name: frozen corn
        amount: ½ cup
        note: fold in with the beef during the rest
      - name: lime juice
        amount: 1 lime
        note: big difference — worth it
      - name: fresh cilantro

instructions:
  - step: In a pan over medium-high heat, cook ground beef, breaking it apart, until fully browned (~5–7 min). Drain fat; rinse under hot water if desired. Set aside.
  - step: Dice onion and mince garlic. Heat oil in a medium saucepan over medium heat. Add onion and cook until softened, about 4–5 minutes. Add garlic and cook 1 more minute until fragrant.
  - step: Add the tomato paste and fry it in the oil with the aromatics for 1–2 minutes, stirring constantly — it should darken slightly and smell less sharp. This caramelizes the paste and is the main flavor-building step.
  - step: Add the uncooked rice and stir with the aromatics for 2 minutes to toast it — adds a subtle nuttiness.
  - step: Pour in the salsa, water, and all seasonings. Stir to combine and bring to a boil.
  - step: Reduce heat to low, cover, and cook until rice is done — about 18 minutes for long-grain, 20–22 for short-grain. Don't lift the lid while it cooks.
  - step: Pull off heat. Lift the lid, stir in the beef (and beans and/or corn if using), cover again, and rest for 5 minutes — the residual heat warms everything through and the beef absorbs the spiced rice flavour. Taste and adjust salt now.
  - step: Scoop into bowls. Top with shredded cheddar (melts from the heat), a generous dollop of Greek yogurt, and a squeeze of lime.

protein:
  grams: 35–45
  note: per serving with 300–350g ground beef 90/10; add beans for another ~8g per serving

firstAttemptNotes:
  date: "2026-05-29"
  notes:
    - Used 900g ground beef for 4 servings (scaled up). Drained and rinsed — at 90/10 the rinse is worth it, the rendered fat pools visibly even at this lean ratio and solidifies as it cools.
    - Cooked rice at ~16 min instead of 18 — preferred the slightly chewier texture. Valid adjustment, no raw crunch.
    - Added seasoning with the dry rice instead of the liquid step — fine, possibly better since the spices bloom briefly in the oil.
    - Needed significantly more salt than expected. Rice absorbs salt heavily and the salsa contributes almost none. Budget 1 tsp in the cooking liquid and taste-adjust during the rest.
    - Folded the beef into the rice during the rest rather than serving separate — works well, everything melds together. Lid on, 5 min off heat, beef warms through without drying out.
    - Added quite a bit of lime juice. Helped but the dish still came out on the mild/flat side overall — not striking compared to Korean and Japanese recipes in the collection.
    - "Outcome: edible and solid but not exciting. The salsa base is inherently mild and the rinsed beef contributes protein but not much flavor. Missing tomato paste (added to recipe after this attempt) and could use more seasoning and a higher salsa-to-water ratio next time."
    - Microwaved after mixing in Greek yogurt when it cooled — worked fine. This dish doesn't need to be piping hot; warm is the right temperature given the yogurt and lime.

tips:
  - keyword: Salt
    text: Budget 1 tsp in the cooking liquid as a baseline, then taste during the rest and add up to ½ tsp more if needed. Rice absorbs salt heavily and the salsa contributes almost none — don't be shy. If it still tastes flat, try lime juice before adding more salt; missing acid often reads as blandness.
  - keyword: Tomato paste
    text: Don't skip the fry step — add the paste to the oil and cook it for 1–2 min before any liquid goes in. Raw tomato paste tastes tinny; fried paste tastes deep and savory. Same principle as jollof rice where it's the flavor foundation.
  - keyword: Rice ratio
    text: Base ratio is ¾ cup salsa to 1¼ cups water per cup of rice. For more salsa flavor, push to 1 cup salsa and 1 cup water — the salsa cooks down fully so there's no textural issue.
  - keyword: Oregano sub
    text: Not essential. Skip it, or substitute ½ tsp thyme, ½ tsp Italian seasoning, or a pinch of marjoram.
  - keyword: Rice type
    text: Short-grain gives a stickier, more cohesive base. Long-grain parboiled stays fluffier and more separated — both work well.
  - keyword: Yogurt
    text: Full-fat Greek yogurt works better here than expected — tangier and thicker than sour cream. Low-fat is fine too.
