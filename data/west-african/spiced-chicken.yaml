id: spiced-chicken
name: Spiced Chicken (Jollof Pairing)
cuisine: west-african
difficulty: easy
time: 25
servings: 2
methods:
  - dry-rub
  - air-fry
  - pan-fry
tags:
  - quick
  - high-protein
  - air-fryer
  - no-marinate

description: >
  Simple seasoned chicken breast built to go with jollof rice. The spice blend mirrors
  the flavors already in the jollof — curry powder, thyme, paprika — so everything on
  the plate tastes like it belongs together. Crispy outside, juicy inside from the air fryer.

keyIngredients:
  - chicken breast
  - curry powder
  - smoked paprika
  - thyme
  - bouillon cube

ingredientGroups:
  - emoji: 🫙
    label: Bowl 1 — Spice rub
    actionNote: mix into a paste, rub all over chicken
    ingredients:
      - amount: 1 tsp
        name: curry powder
        note: null
        alternatives: []
      - amount: 1 tsp
        name: smoked paprika
        note: null
        alternatives:
          - amount: 1 tsp
            name: regular paprika
            note: null
