instructions:
  - section: Marinate
    steps:
      - Cut chicken into 4–5cm bite-sized pieces. Grate ginger and mince garlic. Mix all marinade ingredients in a bowl. Add chicken, toss to coat, and marinate at least 20 min. 1–2 hours is better; overnight in the fridge is best.
  - section: Air Fryer (Recommended)
    steps:
      - Preheat air fryer to 200°C (400°F).
      - Remove chicken from marinade, shaking off excess liquid. Toss pieces in cornstarch until fully coated — a light, even layer.
      - Arrange in a single layer in the air fryer basket. Don't crowd; do two batches if needed.
      - Cook 18–20 min, flipping halfway through, until golden and crispy.
      - Serve immediately with Kewpie mayo, lemon, and cabbage.
  - section: Deep Fry (Alternative)
    steps:
      - Heat neutral oil (vegetable, canola, sunflower) in a pot or deep pan to 170°C (340°F). Use enough oil to submerge the pieces.
      - Coat chicken in cornstarch as above.
      - Fry in batches ~4–5 min per batch until light golden. Don't crowd the pot.
      - Remove and rest on a wire rack 2–3 min. For extra crispiness, raise oil to 190°C (375°F) and fry again ~1–2 min until deep golden and shatteringly crispy.
      - Serve immediately.

protein:
  grams: "50–60"
  note: per serving (200–250g chicken thigh per serving)

tips:
  - keyword: Cornstarch is the secret
    text: Flour makes fried chicken bready and heavy. Cornstarch creates a thin, crispy, almost glass-like shell. Don't substitute flour.
  - keyword: Dry the chicken
    text: Shake off marinade excess or pat lightly before coating — too much liquid prevents the coating from sticking and crisping.
  - keyword: Don't skip the marinate time
    text: 20 min is the minimum. The soy-sake marinade is doing real flavor work, not just surface seasoning.
  - keyword: Air fryer tip
    text: A light spray of neutral oil on top of the coated pieces before cooking helps achieve a more even golden color.
  - keyword: Double fry (deep fry method)
    text: The first fry cooks the chicken through at lower temp; the second fry at high heat crisps the crust. Worth doing if you're already frying in oil.

