id: karaage
name: Karaage (Japanese Fried Chicken)
cuisine: japanese
difficulty: medium
time: 50
servings: 2
methods:
  - marinate
  - air-fry
  - deep-fry
tags:
  - high-protein
  - air-fryer

description: >
  唐揚げ [からあげ] — juicy chicken thighs marinated in soy, sake, ginger, and garlic, coated
  in cornstarch and fried until shatteringly crispy. Japan's answer to fried chicken, and
  arguably better: the pieces are bite-sized, the crust is delicate and light (not bready),
  and the marinade punches all the way through. The air fryer method is the recommended
  approach here — it comes out surprisingly crispy with far less mess and oil.

keyIngredients:
  - chicken thighs
  - soy sauce
  - sake
  - ginger
  - garlic
  - cornstarch

ingredientGroups:
  - emoji: 🫙
    label: Bowl 1 — Marinade
    actionNote: mix together and add chicken to marinate
    ingredients:
      - amount: 3 tbsp
        name: soy sauce
        note: null
        alternatives: []
      - amount: 2 tbsp
        name: sake
        note: null
        alternatives:
          - amount: 2 tbsp
            name: mirin
            note: slightly sweeter, works well
          - amount: 2 tbsp
            name: dry sherry or rice wine vinegar
            note: in a pinch
