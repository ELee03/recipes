instructions:
  - step: Pound the meat to ~1.5cm thickness using a meat mallet, heavy pan, or rolling pin. Even thickness means even cooking.
  - step: Season lightly with salt and pepper on both sides.
  - step: Set up the breading station — flour on one plate, beaten egg in a bowl, panko on another plate.
  - step: Coat each piece — press into flour (shake off excess) → dip in egg (let excess drip off) → press firmly into panko on both sides. The panko should fully cover with no bare spots.
  - step: Heat oil in a skillet over medium heat. Test readiness by dropping a panko crumb in — it should sizzle immediately.
  - step: Add the cutlet. Pan-fry ~3–4 min per side until deep golden brown. Don't press down or move it — let it sit.
  - step: Transfer to a wire rack or paper towel to drain briefly.
  - step: Slice into strips, plate with cabbage and rice, and spoon tonkatsu sauce over the top.
  - section: Air Fryer (Alternative)
    steps:
      - After breading, spray the cutlet generously on both sides with neutral cooking oil spray.
      - Cook at 200°C (400°F) for 15–18 min, flipping once halfway. The crust won't be as deeply golden as pan-fried but is still very good.

protein:
  grams: "45–55"
  note: per serving with chicken breast; pork loin is similar at ~40–50g

tips:
  - keyword: Pound the meat evenly
    text: This is the most important step. Uneven thickness means one part overcooks while another stays raw. Use a zip-lock bag around the meat to avoid mess.
  - keyword: Panko only
    text: Regular fine breadcrumbs make a dense, greasy crust. Panko is coarser, creates air pockets, and stays crispy longer after cooking.
  - keyword: Press the panko firmly
    text: Into the meat — don't just roll it. Pieces that fall off during frying are pieces that weren't pressed in.
  - keyword: Oil temperature matters
    text: Too low and the crust absorbs oil and goes soggy. Too high and it burns before the meat cooks through. Medium heat with a properly pre-heated pan is the target.
  - keyword: Shredded cabbage isn't optional
    text: The raw, crunchy cabbage cuts the richness of the katsu. Pile it high.

