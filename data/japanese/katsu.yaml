id: katsu
name: Katsu (Breaded Chicken or Pork Cutlet)
cuisine: japanese
difficulty: easy
time: 25
servings: 2
methods:
  - pan-fry
  - air-fry
tags:
  - high-protein
  - air-fryer
  - quick

description: >
  A thin cutlet of chicken or pork, coated in the classic flour → egg → panko sequence
  and pan-fried to a golden, crackly crust. Served with tonkatsu sauce, a mound of
  shredded cabbage, and rice — it's filling, high-protein, and way more satisfying than
  it has any right to be for how simple it is. Panko (not regular breadcrumbs) is what
  makes the crust light and airy instead of dense and bready.

keyIngredients:
  - chicken breast
  - panko
  - eggs
  - tonkatsu sauce
  - cabbage

ingredientGroups:
  - emoji: 🍗
    label: Protein
    actionNote: pound to even thickness before breading
    ingredients:
      - amount: "1–2"
        name: boneless chicken breasts (150–180g each), pounded to ~1.5cm thickness
        note: null
        alternatives:
          - amount: "1–2"
            name: chicken thighs
            note: harder to pound evenly but more forgiving and juicier
          - amount: "1–2"
            name: pork loin chops (150–180g each), pounded to ~1.5cm thickness
            note: null
          - amount: "1–2"
            name: pork tenderloin medallions, pounded flat
            note: null

  - emoji: 🫙
    label: Bowl 1 — Breading station
