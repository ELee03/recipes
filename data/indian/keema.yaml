        note: null
        alternatives: []
      - amount: null
        name: plain yogurt on top
        note: optional — balances the heat and adds protein
        alternatives: []

instructions:
  - step: Cook ground meat in a pan over medium-high heat. Break it up as it cooks. Once done, drain fat and rinse if preferred. Set aside.
  - step: Finely dice onion. Mince garlic, grate or mince ginger, and mince green chili if using. In the same pan, sauté onion in a little oil over medium heat until golden, ~5–7 min. Don't rush this — browned onion is flavor.
  - step: Add garlic, ginger, and green chili. Cook ~2 min.
  - step: Add cumin, coriander, turmeric, and paprika. Stir and cook ~1 min — the spices bloom in the oil. This is an important step.
  - step: Add tomato paste or diced tomato. Cook ~3 min until it darkens slightly.
  - step: Return ground meat to the pan. Stir to coat everything in the spice base.
  - step: Add frozen peas if using. Add a splash of water if too dry. Simmer ~5–8 min for flavors to meld.
  - step: Off heat, add garam masala, lemon juice, and cilantro. Taste and adjust salt.

protein:
  grams: "55–65"
  note: per serving; a side of plain yogurt adds another ~10–15g and balances the heat

tips:
  - keyword: Browning the onion properly
    text: Is the difference between a flat keema and a good one. Medium heat, patience, ~6–7 min until golden.
  - keyword: Garam masala goes in at the end
    text: Cooking it too long kills the fragrance. Add it off heat and stir through.
  - keyword: Keema is excellent the next day
    text: Reheat with a splash of water. Great for meal prep.
  - keyword: Keema on toast
    text: Like a spiced sloppy joe — an underrated quick lunch option.

