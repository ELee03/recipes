id: keema
name: Keema (Indian Spiced Ground Meat)
cuisine: indian
difficulty: medium
time: 35
servings: 2
methods:
  - sauté
  - simmer
tags:
  - high-protein
  - one-pan
  - no-marinate
  - meal-prep

description: >
  Keema is a dry-ish spiced ground meat dish — one of the most satisfying things you
  can make with ground beef or lamb. The whole spice base (cumin, coriander, garam masala,
  ginger, garlic) does the work. This is exactly the right dish for the drain-and-rinse
  technique: remove the fat, keep the meat, let the spices carry everything. Serve with
  rice, roti, naan, or just eat it with a spoon.

keyIngredients:
  - ground beef
  - cumin
  - coriander
  - garam masala
  - ginger
  - garlic
  - tomato paste

ingredientGroups:
  - emoji: 🥄
    label: Bowl 1 — Bloom spices
    actionNote: combine dry; added to pan with aromatics to bloom in oil
    ingredients:
      - amount: 1 tsp
        name: cumin
        note: null
        alternatives: []
      - amount: 1 tsp
        name: coriander (ground)
        note: null
        alternatives: []
      - amount: ½ tsp
        name: turmeric
        note: null
        alternatives: []
      - amount: ½ tsp
        name: smoked paprika or Kashmiri chili powder
        note: null
        alternatives: []

  - emoji: 🥩
    label: Protein
    actionNote: cooked first, fat drained, set aside; returned to pan after spice base is built
    ingredients:
      - amount: 300g
        name: ground beef or lamb
        note: lamb is richer; beef works great
        alternatives: []

  - emoji: 🧅
    label: Aromatics
    actionNote: sautéed together in oil until onion is golden
    ingredients:
      - amount: ½
        name: onion, finely diced
        note: null
