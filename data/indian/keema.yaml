      - amount: "3–4 cloves"
        name: garlic, minced
        note: null
        alternatives:
          - amount: null
            name: jarred minced garlic
            note: null
      - amount: 1 tsp
        name: ginger, grated or minced
        note: null
        alternatives:
          - amount: null
            name: jarred minced ginger
            note: or grate directly from a frozen knob
