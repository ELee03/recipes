instructions:
  - step: Cut chicken into large chunks. Mince or grate garlic and grate ginger. Mix all marinade ingredients. Add chicken and coat thoroughly. Marinate in the fridge at least 2 hours; overnight is significantly better.
  - step: When ready to cook, remove chicken from fridge 15 min early.
  - section: Broiler (Recommended)
    steps:
      - Set oven to broil. Place chicken on a foil-lined baking tray.
      - Broil on high, ~10–12 min total, flipping once halfway. You want some char on the edges — that's correct, not burnt.
  - section: Pan Method
    steps:
      - Heat pan on very high heat. Add chicken in a single layer with minimal oil.
      - Don't move it for ~3–4 min to get a sear. Flip and cook other side ~3–4 min.
      - Finish in oven at 200°C if chunks are thick.
  - step: Rest 5 min. Serve with sliced onion, lime, cilantro, and mint yogurt dip.

protein:
  grams: "55–70"
  note: per serving with chicken breast; adding a yogurt dip adds another 10–15g

tips:
  - keyword: The char is intentional and essential
    text: It's part of the flavor. Don't be afraid of the dark spots.
  - keyword: Kashmiri chili powder is mild
    text: It gives the characteristic red-orange color without excessive heat. Substitute with regular paprika or mild chili powder.
  - keyword: This freezes well
    text: Marinate a batch, freeze in the marinade, then thaw and cook when needed.
  - keyword: To turn this into tikka masala
    text: Sauté onion, garlic, ginger, blend with canned tomato, add cream or yogurt and garam masala, then add the cooked tikka. That's the whole dish.
  - keyword: Yogurt marinade mechanics
    text: The yogurt marinade works on two levels simultaneously. Lactic acid (from yogurt's fermentation) mildly denatures surface proteins, improving the crust and texture. Separately, proteolytic enzymes naturally present in yogurt cleave peptide bonds in muscle fibres over the marinate window. Together they produce noticeably more tender chicken than a dry-spice rub alone — and why overnight marinating is meaningfully better than 2 hours.

