id: chicken-tikka
name: Chicken Tikka (Marinated & Grilled Chicken)
cuisine: indian
difficulty: medium
time: 150
servings: 2
methods:
  - marinate
  - broil
  - pan-sear
tags:
  - high-protein
  - meal-prep

description: >
  Tender chunks of chicken marinated in yogurt and spices, then charred under a broiler
  or on a grill. This is the preparation that goes into tikka masala (if you want to add
  a sauce) but it's also excellent completely on its own — just the marinated, charred
  chicken with some sliced onion, a squeeze of lime, and cilantro. High protein, not heavy,
  genuinely delicious. The yogurt marinade tenderizes the chicken and keeps it moist
  even on high heat.

keyIngredients:
  - chicken breast
  - Greek yogurt
  - cumin
  - coriander
  - garam masala
  - Kashmiri chili powder
  - lemon juice

