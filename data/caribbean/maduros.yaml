id: maduros
name: Maduros
cuisine: caribbean
difficulty: easy
time: 15
servings: 2
methods:
  - pan-fry

tags:
  - quick
  - one-pan
  - pantry-friendly

description: >
  Caramelized sweet fried plantains — one of the simplest, most satisfying things you can make.
  The key is ripe plantains (mostly-black skin) so the sugars are fully developed. Pairs with
  jerk chicken, rice and beans, or anything that benefits from a sweet contrast. A legitimate
  carb source at ~35g per serving.

keyIngredients:
  - ripe plantains
  - neutral oil

ingredientGroups:
  - emoji: 🍌
    label: Plantains
    actionNote: peel and slice just before cooking — they oxidize quickly once cut
    ingredients:
      - amount: 2 large
        name: ripe plantains
        note: skin should be mostly yellow-black to fully black; green or yellow won't caramelize
        alternatives: []

  - emoji: 🫙
    label: Frying
    actionNote: null
    ingredients:
      - amount: 2–3 tbsp
        name: neutral oil
        note: enough to coat the pan; not deep fry
        alternatives: []
      - amount: null
        name: flaky salt, to finish
        note: optional but recommended
        alternatives: []
      - amount: null
        name: lime wedge
        note: optional; cuts the sweetness slightly
        alternatives: []

instructions:
  - step: Peel plantains — cut off both ends, score the skin lengthwise, and peel off. Slice on the diagonal into ¾–1 inch pieces.
  - step: Heat oil in a non-stick or cast iron pan over medium heat. When shimmering, add plantain slices in a single layer without crowding.
  - step: Cook 2–3 min per side without moving them, until deep golden brown and caramelized. They should release easily when ready — if they stick, they need more time.
  - step: Transfer to paper towel briefly. Finish with flaky salt and a squeeze of lime if desired.

protein:
  grams: "2"
  note: this is a carb side — ~30–35g carbs per serving, roughly equivalent to a medium potato

tips:
  - keyword: Ripeness
    text: Is everything here. A yellow plantain fries okay but won't caramelize properly. A mostly-black plantain will be sweet, soft, and deeply flavored. Buy yellow and wait 3–5 days at room temp.
  - keyword: Medium heat
    text: Not high. High heat burns the outside before the inside softens. Medium gives the sugars time to caramelize without scorching.
  - keyword: Don't move them
    text: Let them sit undisturbed for the full 2–3 minutes. Touching them too early tears the developing crust.
  - keyword: Flipping tool
    text: Use a thin spatula (fish spatula is ideal). Tongs or tweezers will dent or break the soft flesh when you grip the edge — you need to slide under the whole slice and flip cleanly.
  - keyword: Slice thickness
    text: ¾–1 inch is the target. Thinner and the inside cooks dry before the outside caramelizes — you lose the jammy center. Thicker and the outside scorches before the center softens. The diagonal cut helps too — it increases the flat caramelizing surface area relative to the thickness, so you get more browning per bite.
  - keyword: Starch-to-sugar conversion
    text: Plantain ripening is driven by amylase enzymes that convert complex starches into simple sugars (sucrose, glucose, fructose) as the fruit matures. A green plantain is roughly 75% starch, 5% sugar; a fully black one is nearly the reverse. Maduros caramelize the way they do only because those sugars are present — frying an under-ripe plantain just produces a dense, starchy interior with no sweetness or caramelization.

