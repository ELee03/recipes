id: jerk-chicken-bowl
name: Jerk Chicken Bowl
cuisine: caribbean
difficulty: medium
time: 55
servings: 2
methods:
  - marinate
  - pan-fry

tags:
  - high-protein
  - meal-prep

description: >
  Bold, fiery, smoky jerk chicken — fragrant with allspice, scotch bonnet, and thyme — served
  over rice or alongside tostones or maduros. This is the real flavor profile: not just spicy,
  but deeply aromatic with warm spices and a slight sweetness from brown sugar. The char is
  intentional.

keyIngredients:
  - chicken thighs
  - scotch bonnet pepper
  - allspice
  - soy sauce
  - green onions
  - thyme
  - ginger

