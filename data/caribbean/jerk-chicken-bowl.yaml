instructions:
  - section: Marinate
    steps:
      - Blend all marinade ingredients into a rough paste. A small blender or food processor is easiest; finely mincing by hand works but is messier.
      - Score the chicken thighs with a few shallow cuts so the marinade penetrates. Coat thoroughly.
      - Marinate in the fridge at least 30 min. Overnight is dramatically better — the flavor goes from surface-level to deep.
  - section: Cook
    steps:
      - Pull chicken from the fridge 15 min before cooking to take the chill off.
      - Heat a heavy pan (cast iron is ideal) over medium-high with a thin film of oil. When smoking, add chicken in a single layer.
      - Cook 5–7 min per side for boneless thighs until deeply charred and cooked through (74°C / 165°F internal). The outside should look almost burnt — that caramelized crust is correct.
      - Rest 5 min before slicing.
  - section: Serve
    steps:
      - Slice chicken and serve over rice, or alongside tostones or maduros.
      - If making slaw, toss cabbage with lime juice and salt right before serving — it wilts fast.

protein:
  grams: "55–70"
  note: per serving with 2 boneless chicken thighs (~160–180g each)

tips:
  - keyword: Allspice
    text: Is the non-negotiable flavor of jerk. It smells like cinnamon, cloves, and pepper combined — that's the point. Don't skip it or substitute with a pre-made "jerk seasoning blend" as your only flavor source.
  - keyword: Dark char
    text: Is intentional. Jerk chicken should look almost burnt from the sugar and marinade caramelizing. A pale pan-sear means the heat was too low.
  - keyword: Scotch bonnet
    text: Has a fruity heat that habanero approximates but serrano or jalapeño don't. Worth seeking out at a Caribbean, African, or South Asian grocery if you want the authentic flavor profile.
  - keyword: Overnight marinade
    text: Makes a genuine difference here more than in most recipes. The allspice and thyme need time to work into the meat. If you're doing meal prep, marinate the night before.
  - keyword: Why allspice tastes like a blend
    text: Allspice is a single berry (Pimenta dioica) whose flavor profile naturally contains eugenol (the dominant compound in cloves), cineole (shared with cinnamon and nutmeg), and myrcene (a terpene it shares with black pepper and hops). Calling it "allspice" is literally accurate — it produces the same flavor molecules as multiple spices simultaneously, which is why it defines jerk so completely on its own.

