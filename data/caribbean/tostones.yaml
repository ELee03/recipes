id: tostones
name: Tostones
cuisine: caribbean
difficulty: easy
time: 25
servings: 2
methods:
  - pan-fry

tags:
  - quick
  - one-pan

description: >
  Twice-fried green plantains — crispy, salty, savory, and satisfying. Smashed flat between two
  fries, they come out dense and crunchy like a thick plantain chip. A near-universal Latin American
  and Caribbean side, and the best use of an unripe plantain. Optional garlic mojo takes them up
  another level.

keyIngredients:
  - green plantains
  - neutral oil
  - garlic

ingredientGroups:
  - emoji: 🍌
    label: Plantains
    actionNote: peel by cutting off both ends, scoring the skin lengthwise 3–4 times, and working your fingers under it — the skin is stiff and will resist
    ingredients:
      - amount: 2 large
        name: green plantains
        note: fully green or very slightly yellow; yellow plantains are too soft and won't crisp
        alternatives: []

  - emoji: 🫙
    label: Frying
    actionNote: null
    ingredients:
      - amount: 4–5 tbsp
        name: neutral oil
        note: enough for a shallow fry, about ½ cm depth in the pan
        alternatives: []
      - amount: null
        name: salt
        note: season immediately after the second fry while still hot and oily — it won't stick once cool
        alternatives: []

  - emoji: 🧄
    label: Mojo (optional)
    actionNote: mix together just before serving; drizzle or dip
    ingredients:
      - amount: 3 cloves
        name: garlic, minced
        note: null
        alternatives:
          - amount: 1 tsp
            name: jarred minced garlic
            note: null
      - amount: 2 tbsp
        name: olive oil
        note: null
        alternatives: []
      - amount: 1 tbsp
        name: lime juice
        note: null
