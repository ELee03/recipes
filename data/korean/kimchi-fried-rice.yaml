        name: fried eggs
        note: one per serving — cook separately
        alternatives: []
      - amount: 2
        name: green onion tops
        note: sliced
        alternatives: []
      - amount: null
        name: sesame seeds
        note: null
        alternatives: []
      - amount: null
        name: sesame oil
        note: a few drops to finish
        alternatives: []

instructions:
  - step: Heat a pan or wok over medium-high heat. Add a neutral oil (or a little from the kimchi jar).
  - step: If using protein, cook it first until browned. Remove and set aside.
  - step: Dice onion. Slice green onions, separating white and green parts. Roughly chop kimchi. Sauté onion and garlic until translucent, ~2 min. Add the white parts of green onion.
  - step: Add kimchi and cook ~2 min until it starts to caramelize slightly on the edges.
  - step: Push everything to the side. Add the cold rice to the pan and break it up with a spatula. Let it sit untouched ~1 min to get a little crust, then toss everything together.
  - step: Add the sauce and kimchi juice. Stir-fry 2–3 min until everything is well-coated and the rice looks glossy. Add protein back in and toss.
  - step: Turn off heat. Drizzle a little sesame oil and toss one more time.
  - step: Fry eggs separately to your liking (runny yolk is classic). Plate rice, top with fried egg, green onion tops, and sesame seeds.

protein:
  grams: "30–40"
  note: per serving with egg + SPAM or canned tuna; ~20–25g with egg only; double the protein or add two eggs to push higher

tips:
  - keyword: Day-old rice is the whole game
    text: Fresh rice has too much moisture — it steams and clumps instead of frying. Always make extra rice the night before if you're planning this.
  - keyword: Kimchi juice is free seasoning
    text: Don't skip it — it adds acidity, heat, and fermented funk that you can't replicate any other way.
  - keyword: Don't crowd the pan
    text: If you add rice and there's too much steam, the rice won't crisp. Wok or large skillet at high heat is ideal.
  - keyword: Taste before adding salt
    text: Kimchi juice and soy sauce together are usually enough — add more only if needed.
  - keyword: Runny yolk = sauce
    text: Breaking a runny yolk over fried rice is the move. Hard yolk is fine but you miss the richness.

