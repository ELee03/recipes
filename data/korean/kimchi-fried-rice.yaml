id: kimchi-fried-rice
name: 김치 Fried Rice
cuisine: korean
difficulty: easy
time: 15
servings: 2

methods:
  - pan-fry
  - stir-fry

tags:
  - quick
  - meal-prep
  - one-pan
  - pantry-friendly

description: >
  The ultimate use-what-you-have Korean meal — deeply savory, a little spicy, and endlessly flexible depending on what protein you throw in. Day-old rice is non-negotiable here: fresh rice is too wet and steams instead of frying, giving you mush instead of the slightly crispy, individual grains you want. 고추장 adds fermented depth, 김치 juice does the heavy lifting on seasoning, and a fried egg on top turns it into a complete meal.

keyIngredients:
  - kimchi
  - day-old rice
  - gochujang
  - soy sauce
  - sesame oil
  - kimchi juice
  - egg

ingredientGroups:
  - emoji: 🫙
    label: Bowl 1 — Sauce
    actionNote: mix together, set aside
    ingredients:
      - amount: 1 tbsp
        name: gochujang
        note: null
        alternatives: []
      - amount: 1 tbsp
        name: soy sauce
        note: null
        alternatives: []
      - amount: 1 tsp
        name: sesame oil
        note: null
        alternatives: []
      - amount: 1 tsp
        name: sugar or honey
        note: null
        alternatives: []

  - emoji: 🍚
    label: Rice & Kimchi
    actionNote: the base — have ready before cooking starts
    ingredients:
      - amount: 2 cups
        name: cooked rice
        note: day-old, refrigerated overnight — this is essential
        alternatives: []
      - amount: ¾ cup
        name: kimchi
        note: roughly chopped
        alternatives: []
      - amount: "3–4 tbsp"
        name: kimchi juice
        note: from the jar — the best free seasoning you have
        alternatives: []

  - emoji: 🧄
    label: Aromatics
    actionNote: cooked first
    ingredients:
      - amount: ½
        name: onion
        note: diced
        alternatives: []
      - amount: 2
        name: green onions
        note: white parts sliced thin; green parts reserved for garnish
        alternatives: []
      - amount: 1 tsp
        name: jarred minced garlic
        note: null
