id: gochujang-glazed-salmon
name: Gochujang Glazed Salmon
cuisine: korean
difficulty: easy
time: 20
servings: 2

methods:
  - pan-sear
  - air-fry
  - broil

tags:
  - quick
  - high-protein
  - no-marinate
  - air-fryer

description: >
  High-protein, weeknight-fast, and genuinely impressive-looking for how little effort it takes. The 고추장 glaze — sweet, spicy, fermented — caramelizes against the salmon's natural fat to form a sticky, deeply savory crust. Serve over rice with a pile of green onion and you have a full meal in 20 minutes. The only real risk here is burning the glaze: keep the heat at medium, not high, and watch the last couple minutes closely.

keyIngredients:
  - salmon
  - gochujang
  - soy sauce
  - honey
  - sesame oil
  - mirin
  - garlic

