instructions:
  - step: Mix all marinade ingredients together in a bowl.
  - step: Slice pork thinly. Slice onion thinly. Slice green onions, reserving green parts for garnish. Add pork and onion to the marinade. Mix well so everything is coated. Marinate at least 30 min at room temperature, or overnight in the fridge.
  - step: Heat a large pan or wok over high heat until very hot. Add a small amount of neutral oil.
  - step: Add pork in a single layer — cook in batches if needed. Don't overcrowd or the meat steams instead of searing. Let it sit 1–2 min before moving to get some caramelization.
  - step: Stir-fry ~4–5 min total until cooked through and edges are slightly charred. Add white parts of green onion in the last minute.
  - step: Plate over rice or serve with lettuce wraps. Top with green onion and sesame seeds.
  - section: Ground Pork Version
    steps:
      - Cook ground pork in a hot pan, breaking it apart, until fully cooked and any moisture has evaporated (~5 min).
      - Mix marinade ingredients and pour directly over the cooked pork. Stir-fry another 2–3 min until the sauce cooks down and coats everything.

protein:
  grams: "40–50"
  note: per serving with pork shoulder; pork belly closer to 30–35g due to higher fat content; ground pork in between

tips:
  - keyword: Thin slices are the whole point
    text: Thick slices won't caramelize the same way — the exterior dries out before the center cooks. Partially freeze the pork (~30 min) before slicing to make thin cuts much easier.
  - keyword: Pork shoulder vs. belly
    text: Shoulder is leaner and easier to keep light; belly is more indulgent. Neither is wrong — it just depends on what you're after that day.
  - keyword: Cook in batches
    text: One batch that sears beats two batches that steam. If the pan has too much moisture (steam rising), take some pork out and let the liquid cook off before adding it back.
  - keyword: Char is flavor
    text: A little dark caramelization on the edges is the goal — that's where all the sticky, sweet-spicy depth comes from. Don't be afraid of it.
  - keyword: Lettuce wraps cut the richness
    text: If pork belly feels heavy on its own, wrapping it in cool lettuce with rice balances it out perfectly.
  - keyword: Overnight marinate is noticeably better
    text: The gochujang and soy sauce penetrate deeper, and the pork softens slightly. If you have time, do it the night before.

