id: spicy-korean-pork
name: Spicy Korean Pork (Daeji Bulgogi)
cuisine: korean
difficulty: medium
time: 55
servings: 2
methods:
  - marinate
  - pan-fry
  - stir-fry
tags:
  - meal-prep
  - high-protein

description: >
  Daeji bulgogi is Korean street food at its best — thin pork strips in a bold,
  spicy-sweet marinade that caramelizes in a hot pan into something sticky and
  slightly charred at the edges. Where regular bulgogi is mild and family-friendly,
  this one brings the gochujang heat front and center. Pork belly is the classic,
  richer choice; shoulder is leaner and still great. Ground pork skips the marinate
  time entirely and works on a busy weeknight. Serve over rice or in lettuce wraps
  with sesame seeds and green onion.

keyIngredients:
  - pork shoulder
  - gochujang
  - gochugaru
  - soy sauce
  - mirin
  - sesame oil

