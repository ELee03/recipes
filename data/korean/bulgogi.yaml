instructions:
  - step: If beef isn't pre-sliced thin, partially freeze it (~30 min) then slice as thin as possible against the grain. Slice onion thinly.
  - step: Grate Asian pear/apple. Mince garlic and grate ginger. Mix soy sauce, sesame oil, sugar, garlic, ginger, pear/apple, and pepper.
  - step: Add beef and onion. Mix well and marinate at least 30 min; overnight in the fridge is noticeably better.
  - step: Cook in a hot pan (or grill) in batches — don't overcrowd or it steams instead of sears. High heat, quick cook, ~2–3 min per batch.
  - step: Chop green onions. Finish with sesame seeds and green onion. Serve over rice.

protein:
  grams: "50–55"
  note: per serving; pair with a fried egg or tofu side for more

tips:
  - keyword: pear/apple tenderizer
    text: The pear/apple is not optional — the enzymes genuinely tenderize the beef. No good substitutes.
  - keyword: pre-cut beef
    text: Korean grocery stores sell pre-cut bulgogi beef which saves a lot of time.
  - keyword: hot dry pan
    text: Cook in a very hot, dry pan (or cast iron) for the best caramelization. A little char is good.

