id: bulgogi
name: Bulgogi (Korean Marinated Beef)
cuisine: korean
difficulty: medium
time: 55
servings: 2

methods:
  - marinate
  - pan-fry

tags:
  - high-protein
  - meal-prep

description: >
  불고기 — the classic. Sweet, savory, lightly smoky — one of the most approachable Korean dishes to make at home. Goes over rice, in lettuce wraps, or just straight out of the pan. Use lean beef cuts and trim visible fat if you want to keep it light.

keyIngredients:
  - beef
  - soy sauce
  - sesame oil
  - Asian pear
  - garlic
  - ginger

ingredientGroups:
  - emoji: 🫙
    label: Bowl 1 — Marinade
    actionNote: mix together first
    ingredients:
      - amount: ½
        name: Asian pear or apple
        note: grated; this is the tenderizer — don't skip it
        alternatives: []
      - amount: 3 tbsp
        name: soy sauce
        note: null
        alternatives: []
      - amount: 1 tbsp
        name: sesame oil
        note: null
        alternatives: []
      - amount: 1 tbsp
        name: sugar or honey
        note: null
        alternatives: []
      - amount: 4 cloves
        name: garlic
        note: minced
        alternatives:
          - amount: null
            name: jarred minced garlic
            note: convenient substitute
      - amount: 1 tsp
        name: ginger
        note: grated
        alternatives:
          - amount: null
            name: jarred minced ginger
            note: or freeze a knob and grate from frozen
      - amount: null
