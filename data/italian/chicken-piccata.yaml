id: chicken-piccata
name: Chicken Piccata
cuisine: italian
difficulty: medium
time: 30
servings: 2

methods:
  - pan-sear
  - deglaze
  - simmer

tags:
  - high-protein
  - no-marinate
  - one-pan

description: >
  Bright, lemony, slightly briny from capers. The sauce is built in the pan after searing the
  chicken — deglazing with wine or broth, adding lemon juice and capers. It's one of those dishes
  that tastes way more involved than it is. Lean, flavorful, light. Works over pasta or with a
  simple salad.

keyIngredients:
  - chicken breast
  - capers
  - lemon juice
  - dry white wine
  - chicken broth
  - garlic

