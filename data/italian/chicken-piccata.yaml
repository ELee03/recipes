instructions:
  - step: Halve chicken breasts horizontally and pound to even thickness. Season with salt and pepper. Dredge lightly in flour, shaking off excess.
  - step: Heat olive oil in a pan over medium-high. Sear chicken cutlets ~3 min per side until golden and cooked through. Remove and set aside.
  - step: Mince garlic. Lower heat to medium. Add garlic and cook 30 seconds.
  - step: Deglaze with white wine, scraping up any browned bits. Let reduce by half (~2 min).
  - step: Add chicken broth, lemon juice, and capers. Simmer 3–4 min.
  - step: Swirl in butter if using (off heat). Taste and adjust — more lemon if it needs brightness, more salt if flat.
  - step: Chop parsley. Return chicken to the pan and spoon sauce over it. Finish with parsley.

protein:
  grams: "55–65"
  note: per serving with two chicken breast cutlets

tips:
  - keyword: pound the chicken thin
    text: Pounding the chicken thin (between plastic wrap or in a zip-lock bag) ensures it cooks evenly and fast. Skip this and you'll end up with dry edges and an undercooked center.
  - keyword: skip the wine
    text: If you don't drink, skip the wine and just use all chicken broth. The dish will be less complex but still good.
  - keyword: capers are essential
    text: Capers are essential here — don't sub them out. They provide the brininess that defines piccata.
  - keyword: serving suggestion
    text: This pairs well over angel hair pasta (toss pasta in the extra sauce) or just eaten with a simple green salad.
  - keyword: Acid and protein denaturation
    text: The lemon juice in piccata partially denatures surface proteins via acid hydrolysis — the same mechanism that "cooks" fish in ceviche. At the concentrations used here, heat does the real work, but the acid in the pan sauce prevents the chicken from tightening further during the brief simmer. This is why the finished chicken stays tender even after being returned to the acidic sauce.

